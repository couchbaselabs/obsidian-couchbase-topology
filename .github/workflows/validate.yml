name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build And Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify release artifact
        run: npm run verify:release
